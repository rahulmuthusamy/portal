<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-8">
      <h2 class="text-center mb-4">🤖 Gemini Chat Assistant</h2>

      <!-- Preloaded Suggestions -->
      <div class="mb-3">
        <div class="fw-bold mb-1">💡 Try asking:</div>
        <div class="d-flex flex-wrap gap-2">
          <button *ngFor="let prompt of defaultPrompts"
                  class="btn btn-outline-secondary btn-sm"
                  (click)="usePrompt(prompt)">
            {{ prompt }}
          </button>
        </div>
      </div>

      <!-- Chat Window -->
      <div class="border rounded p-3 mb-3 bg-light" style="height: 400px; overflow-y: auto;" #chatWindow>
        <div *ngFor="let msg of messages" class="mb-2">
          <div [ngClass]="{ 'text-end': msg.role === 'user' }">
            <span class="badge" [ngClass]="msg.role === 'user' ? 'bg-primary' : 'bg-secondary'">
              {{ msg.role === 'user' ? 'You' : 'Gemini' }}
            </span>
            <div class="mt-1 p-2 rounded" [ngClass]="{
                'bg-primary text-white': msg.role === 'user',
                'bg-secondary text-white': msg.role !== 'user'
              }">
              {{ msg.text }}
            </div>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-group">
        <input type="text" [(ngModel)]="userInput" class="form-control"
               placeholder="Ask Gemini something..." (keyup.enter)="sendMessage()" />
        <button class="btn btn-primary" [disabled]="!userInput.trim()" (click)="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>
